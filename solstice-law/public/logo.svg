<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Solstice Law Logo</title>
  <desc id="desc">Premium logo for Solstice Law featuring a solstice horizon, refined SL monogram, and elegant legal wordmark.</desc>

  <defs>
    <linearGradient id="goldGradient" x1="90" y1="40" x2="285" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6B85C"/>
      <stop offset="0.48" stop-color="#C9943A"/>
      <stop offset="1" stop-color="#9F6F25"/>
    </linearGradient>

    <linearGradient id="navyGradient" x1="375" y1="116" x2="985" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <filter id="softGoldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="
        0 0 0 0 0.789
        0 0 0 0 0.580
        0 0 0 0 0.227
        0 0 0 0.35 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>

  <!-- Transparent background by default -->
  <rect width="1200" height="360" fill="transparent"/>

  <!-- Logo Mark Group -->
  <g transform="translate(70 42)" filter="url(#softGoldGlow)">
    <!-- Outer solstice arc -->
    <path
      d="M42 156C42 74.262 108.262 8 190 8C271.738 8 338 74.262 338 156"
      stroke="url(#goldGradient)"
      stroke-width="12"
      stroke-linecap="round"
    />

    <!-- Inner arc -->
    <path
      d="M78 156C78 94.144 128.144 44 190 44C251.856 44 302 94.144 302 156"
      stroke="#C9943A"
      stroke-width="5"
      stroke-linecap="round"
      opacity="0.9"
    />

    <!-- Radiant legal clarity rays -->
    <path d="M190 8V44" stroke="#C9943A" stroke-width="6" stroke-linecap="round"/>
    <path d="M111 35L129 67" stroke="#C9943A" stroke-width="5" stroke-linecap="round"/>
    <path d="M269 35L251 67" stroke="#C9943A" stroke-width="5" stroke-linecap="round"/>
    <path d="M58 100L92 116" stroke="#C9943A" stroke-width="5" stroke-linecap="round"/>
    <path d="M322 100L288 116" stroke="#C9943A" stroke-width="5" stroke-linecap="round"/>

    <!-- Horizon lines -->
    <path d="M0 158H141" stroke="url(#goldGradient)" stroke-width="10" stroke-linecap="round"/>
    <path d="M239 158H380" stroke="url(#goldGradient)" stroke-width="10" stroke-linecap="round"/>

    <path d="M24 184H152" stroke="#C9943A" stroke-width="6" stroke-linecap="round" opacity="0.88"/>
    <path d="M228 184H356" stroke="#C9943A" stroke-width="6" stroke-linecap="round" opacity="0.88"/>

    <path d="M56 208H169" stroke="#C9943A" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
    <path d="M211 208H324" stroke="#C9943A" stroke-width="5" stroke-linecap="round" opacity="0.72"/>

    <!-- Abstract SL monogram: S as turning path -->
    <path
      d="M220 66
         C199 47 157 51 145 81
         C132 113 161 128 190 139
         C225 152 251 170 236 205
         C220 244 159 244 137 211"
      stroke="#0B1020"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M220 66
         C199 47 157 51 145 81
         C132 113 161 128 190 139
         C225 152 251 170 236 205
         C220 244 159 244 137 211"
      stroke="#FAF7F0"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.9"
    />

    <!-- L geometry: firm, strategic vertical counsel -->
    <path
      d="M222 46V222H286"
      stroke="#0B1020"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M222 46V222H286"
      stroke="#FAF7F0"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.9"
    />

    <!-- Small solstice point -->
    <circle cx="190" cy="156" r="9" fill="#C9943A"/>
    <circle cx="190" cy="156" r="4" fill="#FAF7F0"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(410 118)">
    <text
      x="0"
      y="80"
      fill="url(#navyGradient)"
      font-family="Playfair Display, Cormorant Garamond, Georgia, serif"
      font-size="86"
      font-weight="700"
      letter-spacing="-2.2"
    >
      Solstice Law
    </text>

    <path d="M4 112H458" stroke="#C9943A" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

    <text
      x="2"
      y="152"
      fill="#64748B"
      font-family="Inter, Avenir, Helvetica, Arial, sans-serif"
      font-size="19"
      font-weight="600"
      letter-spacing="4.8"
    >
      STRATEGIC LEGAL COUNSEL
    </text>
  </g>
</svg>
